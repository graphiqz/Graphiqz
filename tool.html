<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphiqz Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="glass">
        <div class="logo">Graphiqz</div>
        <nav>
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="tool-container fade-in">
        <div class="tool-controls glass">
            <h2>Generate UI Animation</h2>
            <textarea id="promptBox" rows="6" placeholder="Describe your motion graphic (e.g., A sliding glass window with a line chart...)"></textarea>
            
            <div style="display: flex; gap: 1rem;">
                <select id="fpsSelect">
                    <option value="30">30 FPS (Free)</option>
                    <option value="60">60 FPS (Pro)</option>
                </select>
                
                <select id="durationSelect">
                    <option value="5">5s Duration (Free)</option>
                    <option value="15">15s Duration (Pro)</option>
                </select>
            </div>

            <button id="renderBtn">Generate & Render</button>
        </div>

        <div class="tool-preview glass">
            <div class="preview-box">
                <p style="color: #fff; text-align: center; margin-top: 25%;">Preview Canvas</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
