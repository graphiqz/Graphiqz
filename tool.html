<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphiqz Studio — AI Motion Graphics</title>

  <link rel="stylesheet" href="global.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── LOCK PAGE ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0; padding: 0;
    }

    /* ── TOPBAR (replaces navbar) ── */
    .tool-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--nav-bg);
      backdrop-filter: var(--nav-blur);
      border-bottom: 1px solid var(--border-glass);
      z-index: 100;
      flex-shrink: 0;
    }

    .tool-topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-brand {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(90deg, #9CD5FF, #4988C4, #7AAACE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tool-brand-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      padding: 2px 9px;
      border-radius: 99px;
    }

    .tool-topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .plan-badge {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      padding: 5px 12px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .plan-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6bcb77;
      box-shadow: 0 0 6px #6bcb77;
    }

    .upgrade-btn {
      font-size: 0.78rem;
      font-family: var(--font-body);
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 10px;
      border: none;
      background: var(--grad-accent);
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .upgrade-btn:hover { opacity: 0.88; transform: scale(1.02); }

    .theme-toggle {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border-glass);
      background: var(--bg-glass);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.2s;
    }
    .theme-toggle:hover { background: var(--bg-glass-strong); }
    .theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── TOOL ROOT ── */
    .tool-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 58px;
      overflow: hidden;
    }

    /* ── CENTER STAGE ── */
    .tool-stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* ── IDLE TEXT ── */
    .stage-idle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      padding: 0 24px;
      transition: opacity 0.38s ease, transform 0.38s ease;
      pointer-events: none;
    }

    .stage-idle.out {
      opacity: 0;
      transform: translate(-50%, -62%);
    }

    .stage-idle-title {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-family: var(--font-heading);
      font-weight: 700;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.05;
      margin-bottom: 12px;
    }

    .stage-idle-sub {
      font-size: 1rem;
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    /* ── GEN CARD ── */
    .gen-card {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(48px) scale(0.95);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.42s cubic-bezier(0.34,1.4,0.64,1),
                  transform 0.42s cubic-bezier(0.34,1.4,0.64,1);

      width: min(800px, 88vw);
      height: min(460px, 54vh);
      border-radius: 18px;
      border: 1px solid var(--border-glass);
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .gen-card.show {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(1);
      pointer-events: all;
    }

    .gen-card.exit {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(-40px) scale(0.96);
    }

    /* Loading */
    .gen-loading {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
    }

    .gen-spinner {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 3px solid var(--border-glass);
      border-top-color: #9CD5FF;
      animation: gspin 1s linear infinite;
    }

    @keyframes gspin { to { transform: rotate(360deg); } }

    .gen-ltitle {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-heading);
    }

    .gen-lsub {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .gen-ptrack {
      width: 220px; height: 3px;
      background: var(--bg-glass);
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4988C4, #9CD5FF);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .gen-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .gen-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      transition: color 0.3s;
    }
    .gen-step.active { color: #9CD5FF; }
    .gen-step.done   { color: #6bcb77; }

    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* Result */
    .gen-result {
      display: none;
      width: 100%; height: 100%;
      position: relative;
    }
    .gen-result.show { display: block; }

    #previewer-canvas {
      width: 100%; height: 100%;
    }

    #previewer-canvas iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* Export btn overlay */
    #download-btn {
      position: absolute;
      top: 12px; right: 12px;
      padding: 7px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-glass-hover);
      background: rgba(8,15,30,0.85);
      color: #9CD5FF;
      font-size: 0.78rem;
      font-family: var(--font-body);
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(12px);
      transition: background 0.2s;
      z-index: 20;
    }
    #download-btn:hover { background: rgba(73,136,196,0.25); }
    #download-btn.show  { display: flex; }

    /* ── BOTTOM PROMPT BAR ── */
    .prompt-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 12px 16px 18px;
    }

    .prompt-card {
      width: min(720px, 94vw);
      background: var(--bg-glass-strong);
      border: 1px solid var(--border-glass);
      border-radius: 18px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
    }

    /* Options row */
    .prompt-opts {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .prompt-opts::-webkit-scrollbar { display: none; }

    .pill-group {
      display: flex;
      align-items: center;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 99px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.74rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pill.active {
      background: var(--grad-accent);
      color: white;
      box-shadow: 0 2px 8px rgba(73,136,196,0.4);
    }

    .pill:hover:not(.active):not(.locked) {
      color: var(--text-secondary);
      background: var(--bg-glass-strong);
    }

    .pill.locked { opacity: 0.4; cursor: not-allowed; }

    .pro-tag {
      font-size: 0.55rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd93d, #ff6b6b);
      color: white;
      padding: 1px 5px;
      border-radius: 99px;
    }

    .ratio-wrap {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 99px;
      padding: 4px 12px;
      flex-shrink: 0;
    }

    #ratio-select {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.74rem;
      font-family: var(--font-body);
      cursor: pointer;
      outline: none;
      appearance: none;
    }

    #ratio-select option {
      background: #0a1628;
      color: #F7F8F0;
    }

    [data-theme="light"] #ratio-select option {
      background: #eef2f8;
      color: #1a2d3e;
    }

    /* Input row */
    .prompt-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 0.94rem;
      font-family: var(--font-body);
      resize: none;
      line-height: 1.5;
      min-height: 24px;
      max-height: 88px;
      overflow-y: auto;
    }

    #prompt-input::placeholder { color: var(--text-muted); }

    #generate-btn {
      width: 42px; height: 42px;
      border-radius: 11px;
      border: none;
      background: var(--grad-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-btn);
      transition: transform 0.18s, opacity 0.18s;
    }
    #generate-btn:hover  { transform: scale(1.08); }
    #generate-btn:active { transform: scale(0.95); }
    #generate-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    /* ── MOBILE ── */
    @media (max-width: 540px) {
      .tool-topbar { padding: 0 16px; }
      .tool-brand-label { display: none; }
      .plan-badge { display: none; }

      .gen-card {
        width: 94vw;
        height: 42vh;
        border-radius: 14px;
      }

      .prompt-card {
        width: 96vw;
        padding: 10px 12px;
        border-radius: 14px;
        gap: 8px;
      }

      .stage-idle-title { font-size: 2.4rem; }
      .stage-idle-sub   { font-size: 0.88rem; }

      .pill { padding: 4px 10px; font-size: 0.7rem; }
      #prompt-input { font-size: 0.88rem; }
      #generate-btn { width: 38px; height: 38px; border-radius: 10px; }
    }
  </style>
</head>
<body>

  <div class="bg-mesh" aria-hidden="true">
    <div class="bg-mesh-extra"></div>
  </div>

  <!-- TOPBAR -->
  <header class="tool-topbar">
    <div class="tool-topbar-left">
      <a href="index.html" class="tool-brand">Graphiqz</a>
      <span class="tool-brand-label">Studio</span>
    </div>
    <div class="tool-topbar-right">
      <div class="plan-badge">
        <span class="plan-badge-dot"></span>
        Free · 30fps · 5s
      </div>
      <button class="theme-toggle" id="tool-theme-toggle" aria-label="Toggle theme">
        <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-14a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V4a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zM4.22 5.64a1 1 0 0 1 1.42-1.42l.7.71a1 1 0 0 1-1.41 1.41l-.71-.7zM17.66 19.07a1 1 0 1 1 1.41-1.41l.71.7a1 1 0 0 1-1.42 1.42l-.7-.71zM3 12a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1zm17 0a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2h-1a1 1 0 0 1-1-1zM5.64 19.07l-.7.71a1 1 0 0 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 1.41zM19.07 5.64a1 1 0 1 1 1.41 1.41l-.7.71a1 1 0 0 1-1.42-1.42l.71-.7z"/></svg>
        <svg class="theme-icon-moon" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="pricing.html" class="upgrade-btn">
        ★ Upgrade to Pro
      </a>
    </div>
  </header>

  <!-- TOOL ROOT -->
  <div class="tool-root">

    <!-- CENTER STAGE -->
    <div class="tool-stage">

      <!-- Idle -->
      <div class="stage-idle" id="stage-idle">
        <div class="stage-idle-title">Your turn.</div>
        <div class="stage-idle-sub">Describe any animation and watch it come to life.</div>
      </div>

      <!-- Card -->
      <div class="gen-card" id="gen-card">

        <!-- Loading -->
        <div class="gen-loading" id="gen-loading">
          <div class="gen-spinner"></div>
          <div class="gen-ltitle" id="gen-ltitle">Generating animation...</div>
          <div class="gen-lsub"   id="gen-lsub">This takes a few seconds</div>
          <div class="gen-ptrack"><div id="progress-bar"></div></div>
          <div class="gen-steps">
            <div class="gen-step" id="step-analyze"><div class="step-dot"></div>Analyzing prompt</div>
            <div class="gen-step" id="step-generate"><div class="step-dot"></div>Generating code</div>
            <div class="gen-step" id="step-render"><div class="step-dot"></div>Rendering preview</div>
            <div class="gen-step" id="step-ready"><div class="step-dot"></div>Ready</div>
          </div>
        </div>

        <!-- Result -->
        <div class="gen-result" id="gen-result">
          <div id="previewer-canvas"></div>
        </div>

        <!-- Export -->
        <button id="download-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Export
        </button>

      </div>
    </div>

    <!-- PROMPT BAR -->
    <div class="prompt-bar">
      <div class="prompt-card">

        <div class="prompt-opts">
          <div class="pill-group">
            <button class="pill active" data-fps="30">30 FPS</button>
            <button class="pill locked" data-fps="60">60 FPS <span class="pro-tag">PRO</span></button>
          </div>
          <div class="ratio-wrap">
            <select id="ratio-select">
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
              <option value="1:1">1:1</option>
              <option value="4:3">4:3</option>
              <option value="21:9">21:9</option>
            </select>
          </div>
          <div class="pill-group">
            <button class="pill active" data-dur="5">5s</button>
            <button class="pill locked" data-dur="10">10s <span class="pro-tag">PRO</span></button>
            <button class="pill locked" data-dur="15">15s <span class="pro-tag">PRO</span></button>
          </div>
        </div>

        <div class="prompt-input-row">
          <textarea
            id="prompt-input"
            placeholder="Describe your animation..."
            maxlength="500"
            rows="1"
          ></textarea>
          <button id="generate-btn" aria-label="Generate">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="19" height="19" fill="white"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </button>
        </div>

      </div>
    </div>

  </div>

  <script src="main.js"></script>
  <script src="tool.js"></script>
</body>
</html>
