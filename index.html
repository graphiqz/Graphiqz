<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Graphiqz - AI Generated Motion Graphics. Transform text prompts into premium 3D animations and UI videos instantly.">
    <title>Graphiqz | AI Motion Graphics</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <header class="glass">
        <div class="logo">Graphiqz</div>
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
        <nav>
            <ul id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="tool.html">Try Graphiqz</a></li>

    <main style="margin-top: 150px; padding: 0 5%;">
        <section class="fade-in glass" style="text-align: center; padding: 4rem;">

            <p style="font-size: 1.5rem;">The engine for the modern video editor.</p>
            <button onclick="window.location.href='tool.html'" style="width: auto; padding: 1rem 3rem; margin-top: 2rem;">Start Rendering</button>

        <section class="fade-in" style="display: flex; justify-content: space-around; margin-top: 4rem;">
            <div class="glass" style="padding: 2rem; text-align: center;">
                <h2 class="counter" data-target="5000">0</h2>
                <p>Videos Rendered</p>
            </div>
            <div class="glass" style="padding: 2rem; text-align: center;">
                <h2 class="counter" data-target="99">0</h2>

            </div>
