<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Graphiqz</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js"></script>
</head>
<body>

    <header class="glass">
        <div class="logo">Graphiqz</div>
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
        <nav>
            <ul id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="tool.html">Try Graphiqz</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <button id="themeToggle" class="glass">🌓</button>
    </header>

    <main style="margin-top: 150px; padding: 0 5%; display: flex; justify-content: center;">
        <section class="glass fade-in" style="padding: 3rem; width: 100%; max-width: 600px;">
            <h1 style="font-size: 2.5rem; text-align: center; font-family: 'Bricolage Grotesque'; margin-bottom: 2rem;">Get in Touch</h1>
            
            <form id="contactForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <input type="text" id="name" placeholder="Your Name" required style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary); font-family: 'Lato', sans-serif;">
                
                <input type="email" id="email" placeholder="Your Email" required style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary); font-family: 'Lato', sans-serif;">
                
                <textarea id="message" rows="5" placeholder="How can we help you?" required style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary); font-family: 'Lato', sans-serif; resize: vertical;"></textarea>
                
                <button type="submit" id="submitBtn">Send Message</button>
                <p id="formStatus" style="text-align: center; display: none;"></p>
            </form>
        </section>
    </main>

    <footer style="text-align: center; padding: 2rem; margin-top: 4rem; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 Graphiqz. All Rights Reserved.</p>
    </footer>

    
    <script>
        // Temporary Frontend Logic for the Contact Form
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('formStatus');
            
            btn.innerText = "Sending...";
            
            // We will replace this setTimeout with the actual Resend API fetch call later!
            setTimeout(() => {
                btn.innerText = "Send Message";
                status.style.display = "block";
                status.style.color = "#7AAACE";
                status.innerText = "Message sent successfully! We will get back to you soon.";
                document.getElementById('contactForm').reset();
            }, 1500);
        });
    </script>
</body>
</html>
